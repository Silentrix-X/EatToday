<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天吃什么 - CYBERPUNK 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #9d00ff;
            --neon-cyan: #00ffff;
            --dark-bg: #0a0a0f;
            --darker-bg: #050508;
            --card-bg: rgba(15, 15, 25, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(135deg, var(--darker-bg) 0%, #0d0d1a 50%, var(--darker-bg) 100%);
            color: var(--neon-cyan);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 243, 255, 0.03) 0px,
                rgba(0, 243, 255, 0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow:
                0 0 10px var(--neon-blue),
                0 0 20px var(--neon-blue),
                0 0 40px var(--neon-blue),
                0 0 80px var(--neon-blue);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow:
                    0 0 10px var(--neon-blue),
                    0 0 20px var(--neon-blue),
                    0 0 40px var(--neon-blue);
            }
            to {
                text-shadow:
                    0 0 20px var(--neon-blue),
                    0 0 30px var(--neon-blue),
                    0 0 60px var(--neon-blue),
                    0 0 100px var(--neon-blue);
            }
        }

        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 var(--neon-pink);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 var(--neon-cyan);
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(61px, 9999px, 91px, 0); }
            20% { clip: rect(35px, 9999px, 71px, 0); }
            40% { clip: rect(105px, 9999px, 38px, 0); }
            60% { clip: rect(8px, 9999px, 128px, 0); }
            80% { clip: rect(79px, 9999px, 15px, 0); }
            100% { clip: rect(26px, 9999px, 84px, 0); }
        }

        .subtitle {
            font-size: 1rem;
            color: var(--neon-purple);
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 300;
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .result-container {
            background: var(--card-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 60px 40px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 20px rgba(0, 243, 255, 0.3),
                inset 0 0 40px rgba(0, 243, 255, 0.05);
        }

        .result-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple), var(--neon-pink), var(--neon-cyan));
            border-radius: 20px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .result {
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px var(--neon-cyan);
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .selecting {
            animation: pulse 0.3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cyber-button {
            position: relative;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 18px 45px;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-cyan);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            overflow: hidden;
            transition: all 0.3s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .cyber-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .cyber-button:hover::before {
            left: 100%;
        }

        .cyber-button:hover {
            background: rgba(0, 243, 255, 0.1);
            box-shadow:
                0 0 20px var(--neon-blue),
                inset 0 0 20px rgba(0, 243, 255, 0.2);
            transform: translateY(-2px);
        }

        .cyber-button:active {
            transform: translateY(0);
        }

        .cyber-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .cyber-button.secondary {
            border-color: var(--neon-purple);
            color: var(--neon-purple);
        }

        .cyber-button.secondary:hover {
            background: rgba(157, 0, 255, 0.1);
            box-shadow:
                0 0 20px var(--neon-purple),
                inset 0 0 20px rgba(157, 0, 255, 0.2);
        }

        .button-text {
            position: relative;
            z-index: 1;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            background: var(--card-bg);
            border: 1px solid var(--neon-purple);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 10px rgba(157, 0, 255, 0.2);
        }

        .stat-label {
            display: block;
            font-size: 0.9rem;
            color: var(--neon-purple);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-value {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .manage-section {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        .scene-panel {
            background: var(--card-bg);
            border: 2px solid var(--neon-purple);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.2);
        }

        .scene-panel h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--neon-purple);
            margin-bottom: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .scene-select-row {
            margin-bottom: 12px;
        }

        .scene-select-actions {
            display: flex;
            width: 100%;
            margin-bottom: 20px;
        }

        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-cyan);
            border-radius: 5px;
            color: var(--neon-cyan);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group select:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .scene-manage {
            border-top: 1px solid rgba(157, 0, 255, 0.35);
            padding-top: 16px;
        }

        .scene-add-row {
            margin-bottom: 12px;
        }

        .scene-add-actions {
            display: flex;
            width: 100%;
            margin-bottom: 14px;
        }

        .scene-select-actions .cyber-button,
        .scene-add-actions .cyber-button {
            width: 100%;
        }

        .scene-add-row input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-cyan);
            border-radius: 5px;
            color: var(--neon-cyan);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .scene-add-row input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .scene-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .scene-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon-purple);
            border-radius: 8px;
            padding: 10px 12px;
        }

        .scene-item.current {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.25);
        }

        .scene-name {
            color: var(--neon-cyan);
            font-weight: 600;
        }

        .scene-badge {
            margin-left: 8px;
            font-size: 0.75rem;
            color: var(--neon-purple);
        }

        .data-panel {
            background: var(--card-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .data-panel h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--neon-blue);
            margin-bottom: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .data-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .import-options {
            border-top: 1px solid rgba(0, 243, 255, 0.25);
            padding-top: 12px;
        }

        .option-title {
            color: var(--neon-purple);
            font-size: 0.9rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px 14px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--neon-cyan);
            font-size: 0.95rem;
        }

        .option-item input[type='checkbox'] {
            accent-color: var(--neon-blue);
            width: 16px;
            height: 16px;
        }

        .import-selection {
            border-top: 1px solid rgba(0, 243, 255, 0.25);
            margin-top: 12px;
            padding-top: 12px;
        }

        .import-summary {
            color: rgba(0, 243, 255, 0.75);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .import-select-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .import-select-actions .action-btn {
            padding: 6px 10px;
            font-size: 0.85rem;
        }

        .import-list-box {
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid rgba(0, 243, 255, 0.35);
            border-radius: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.35);
            margin-bottom: 12px;
        }

        .import-list-box::-webkit-scrollbar {
            width: 8px;
        }

        .import-list-box::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .import-list-box::-webkit-scrollbar-thumb {
            background: var(--neon-blue);
            border-radius: 4px;
        }

        .import-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 7px;
            color: var(--neon-cyan);
        }

        .import-item:last-child {
            margin-bottom: 0;
        }

        .import-item input[type='checkbox'] {
            accent-color: var(--neon-blue);
            width: 16px;
            height: 16px;
        }

        .import-item.disabled {
            opacity: 0.45;
        }

        .add-form,
        .restaurant-list {
            background: var(--card-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .add-form h2,
        .restaurant-list h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-blue);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--neon-purple);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-cyan);
            border-radius: 5px;
            color: var(--neon-cyan);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .hint {
            display: block;
            font-size: 0.75rem;
            color: rgba(0, 243, 255, 0.6);
            margin-top: 5px;
        }

        .items-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .items-container::-webkit-scrollbar {
            width: 8px;
        }

        .items-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .items-container::-webkit-scrollbar-thumb {
            background: var(--neon-blue);
            border-radius: 4px;
        }

        .restaurant-item {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-purple);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .restaurant-item:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            transform: translateX(5px);
        }

        .restaurant-info {
            flex: 1;
        }

        .restaurant-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--neon-cyan);
            margin-bottom: 5px;
        }

        .restaurant-weight {
            font-size: 0.9rem;
            color: var(--neon-purple);
        }

        .weight-bar {
            height: 4px;
            background: rgba(0, 243, 255, 0.2);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .weight-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: width 0.3s;
        }

        .restaurant-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 8px 15px;
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .empty-message {
            text-align: center;
            color: rgba(0, 243, 255, 0.5);
            padding: 40px 20px;
            font-style: italic;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid rgba(0, 243, 255, 0.2);
            color: rgba(0, 243, 255, 0.5);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 243, 255, 0.9);
            color: #000;
            padding: 15px 25px;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            z-index: 10000;
            animation: slideIn 0.3s ease-out;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
                letter-spacing: 3px;
            }

            .result-text {
                font-size: 1.8rem;
            }

            .manage-section {
                grid-template-columns: 1fr;
            }

            .cyber-button {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            .result-container {
                padding: 40px 20px;
            }

            .button-group {
                flex-direction: column;
            }

            .cyber-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="container">
        <!-- 主页 -->
        <div id="homePage" class="page active">
            <header>
                <h1 class="glitch" data-text="今天吃什么？">今天吃什么？</h1>
                <p class="subtitle">MEAL SELECTOR V2.0</p>
            </header>

            <main>
                <div class="result-container">
                    <div id="result" class="result">
                        <span class="result-text">点击按钮开始选择</span>
                    </div>
                </div>

                <div class="button-group">
                    <button id="selectBtn" class="cyber-button">
                        <span class="button-text">随机选择</span>
                        <span class="button-glow"></span>
                    </button>
                    <button id="manageBtn" class="cyber-button secondary">
                        <span class="button-text">管理餐厅</span>
                        <span class="button-glow"></span>
                    </button>
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">当前场景</span>
                        <span id="currentSceneDisplay" class="stat-value">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">餐厅数量</span>
                        <span id="totalRestaurants" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">今日选择</span>
                        <span id="todayCount" class="stat-value">0</span>
                    </div>
                </div>
            </main>

            <footer>
                <p>© 2026 CYBERPUNK MEAL SELECTOR</p>
            </footer>
        </div>

        <!-- 管理页面 -->
        <div id="managePage" class="page">
            <header>
                <h1 class="glitch" data-text="餐厅管理">餐厅管理</h1>
                <p class="subtitle">RESTAURANT MANAGEMENT</p>
            </header>

            <main>
                <div class="scene-panel">
                    <h2>场景设置</h2>
                    <div class="scene-select-row">
                        <div class="form-group">
                            <label for="currentSceneSelect">当前场景</label>
                            <select id="currentSceneSelect"></select>
                        </div>
                    </div>
                    <div class="scene-select-actions">
                        <button id="applySceneBtn" class="cyber-button secondary">
                            <span class="button-text">应用场景</span>
                            <span class="button-glow"></span>
                        </button>
                    </div>

                    <div class="scene-manage">
                        <div class="scene-add-row">
                            <input type="text" id="sceneNameInput" placeholder="新增场景，如：家里、公司" maxlength="30">
                        </div>
                        <div class="scene-add-actions">
                            <button id="addSceneBtn" class="cyber-button">

                <div class="data-panel">

                        </button>

                        <div class="option-grid">
                            <label class="option-item">
                                <input type="checkbox" id="importTodayCountOpt">
                                <span>导入今日选择次数</span>
                            </label>
                        </div>

                        <div class="scene-add-actions" style="margin-top:14px;margin-bottom:0;">
                            <button id="confirmImportBtn" class="cyber-button">
                                <span class="button-text">确认导入选中项</span>
                                <span class="button-glow"></span>
                            </button>
                        </div>
                    </div>
                    <input type="file" id="importFileInput" accept="application/json" style="display:none;">
                </div>

                <div class="manage-section">
                    <div class="add-form">
                        <h2>添加餐厅</h2>
                        <div class="form-group">
                            <label for="restaurantName">餐厅名称</label>
                            <input type="text" id="restaurantName" placeholder="输入餐厅名称..." maxlength="50">
                        </div>
                        <div class="form-group">
                            <label for="restaurantWeight">权重 (1-100)</label>
                            <input type="number" id="restaurantWeight" min="1" max="100" value="10" placeholder="权重值">
                            <span class="hint">权重越高，被选中的概率越大</span>
                        </div>
                        <button id="addBtn" class="cyber-button">
                            <span class="button-text">+ 添加餐厅</span>
                            <span class="button-glow"></span>
                        </button>
                    </div>

                    <div class="restaurant-list">
                        <h2>餐厅列表</h2>
                        <div id="restaurantItems" class="items-container">
                            <p class="empty-message">暂无餐厅，请添加...</p>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button id="backBtn" class="cyber-button secondary">
                        <span class="button-text">返回主页</span>
                        <span class="button-glow"></span>
                    </button>
                </div>

            <footer>
                <p>© 2026 CYBERPUNK MEAL SELECTOR</p>
            </footer>
        </div>
    </div>

    <script>
        // ========== 数据管理 ==========
        function initDefaultRestaurants() {
            const restaurants = getRestaurants();
            if (restaurants.length === 0) {
                const currentSceneId = getCurrentSceneId();
                const defaultRestaurants = [
                    { id: 1, name: '麦当劳', weight: 10, sceneId: currentSceneId },
                    { id: 2, name: '肯德基', weight: 10, sceneId: currentSceneId },
                    { id: 3, name: '黄焖鸡米饭', weight: 15, sceneId: currentSceneId },
                    { id: 4, name: '沙县小吃', weight: 15, sceneId: currentSceneId },
                    { id: 5, name: '兰州拉面', weight: 12, sceneId: currentSceneId }
                ];
                saveRestaurants(defaultRestaurants);
            }
        }

        function getRestaurants() {
            const data = localStorage.getItem('restaurants');
            return data ? JSON.parse(data) : [];
        }

        function saveRestaurants(restaurants) {
            localStorage.setItem('restaurants', JSON.stringify(restaurants));
        }

        function getScenes() {
            const data = localStorage.getItem('scenes');
            const scenes = data ? JSON.parse(data) : [];
            return Array.isArray(scenes) ? scenes : [];
        }

        function saveScenes(scenes) {
            localStorage.setItem('scenes', JSON.stringify(scenes));
        }

        function generateSceneId() {
            const scenes = getScenes();
            if (scenes.length === 0) return 1;
            return Math.max(...scenes.map(s => s.id)) + 1;
        }

        function initDefaultScenes() {
            const scenes = getScenes();
            if (scenes.length === 0) {
                const defaultScenes = [
                    { id: 1, name: '默认' },
                    { id: 2, name: '家里' },
                    { id: 3, name: '公司' }
                ];
                saveScenes(defaultScenes);
            }

            const currentSceneId = parseInt(localStorage.getItem('currentSceneId') || '', 10);
            const latestScenes = getScenes();
            if (!latestScenes.some(scene => scene.id === currentSceneId)) {
                localStorage.setItem('currentSceneId', String(latestScenes[0].id));
            }
        }

        function getCurrentSceneId() {
            const scenes = getScenes();
            if (scenes.length === 0) return null;
            const currentSceneId = parseInt(localStorage.getItem('currentSceneId') || '', 10);
            if (scenes.some(scene => scene.id === currentSceneId)) {
                return currentSceneId;
            }
            const fallbackId = scenes[0].id;
            localStorage.setItem('currentSceneId', String(fallbackId));
            return fallbackId;
        }

        function getCurrentScene() {
            const scenes = getScenes();
            const currentSceneId = getCurrentSceneId();
            return scenes.find(scene => scene.id === currentSceneId) || null;
        }

        function normalizeRestaurantsForScenes() {
            const restaurants = getRestaurants();
            const currentSceneId = getCurrentSceneId();
            let changed = false;
            restaurants.forEach(restaurant => {
                if (typeof restaurant.sceneId !== 'number') {
                    restaurant.sceneId = currentSceneId;
                    changed = true;
                }
            });
            if (changed) {
                saveRestaurants(restaurants);
            }
        }

        function getTodayCount() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('lastDate');
            if (savedDate !== today) {
                localStorage.setItem('lastDate', today);
                localStorage.setItem('todayCount', '0');
                return 0;
            }
            return parseInt(localStorage.getItem('todayCount') || '0');
        }

        function incrementTodayCount() {
            const count = getTodayCount() + 1;
            localStorage.setItem('todayCount', count.toString());
            return count;
        }

        function generateId() {
            const restaurants = getRestaurants();
            if (restaurants.length === 0) return 1;
            return Math.max(...restaurants.map(r => r.id)) + 1;
        }

        function normalizeScenes() {
            const scenes = getScenes();
            if (scenes.length === 0) {
                initDefaultScenes();
                return getScenes();
            }

            const nameSet = new Set();
            const normalized = [];
            let maxId = 0;
            scenes.forEach((scene, index) => {
                const rawName = typeof scene.name === 'string' ? scene.name.trim() : '';
                if (!rawName) return;
                if (nameSet.has(rawName)) return;
                nameSet.add(rawName);

                const sceneId = Number.isInteger(scene.id) && scene.id > 0 ? scene.id : index + 1;
                maxId = Math.max(maxId, sceneId);
                normalized.push({ id: sceneId, name: rawName });
            });

            if (normalized.length === 0) {
                const fallback = [{ id: 1, name: '默认' }];
                saveScenes(fallback);
                localStorage.setItem('currentSceneId', '1');
                return fallback;
            }

            if (normalized.length !== scenes.length) {
                saveScenes(normalized);
            }

            const currentSceneId = getCurrentSceneId();
            if (!normalized.some(scene => scene.id === currentSceneId)) {
                localStorage.setItem('currentSceneId', String(normalized[0].id));
            }

            return normalized;
        }

        // ========== 页面切换 ==========
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        // ========== 主页逻辑 ==========
        function selectRestaurant(restaurants) {
            if (restaurants.length === 0) return null;

            const totalWeight = restaurants.reduce((sum, r) => sum + r.weight, 0);
            let random = Math.random() * totalWeight;

            for (const restaurant of restaurants) {
                random -= restaurant.weight;
                if (random <= 0) {
                    return restaurant;
                }
            }

            return restaurants[0];
        }

        function updateStats() {
            const currentSceneId = getCurrentSceneId();
            const restaurants = getRestaurants().filter(r => r.sceneId === currentSceneId);
            const todayCount = getTodayCount();
            const currentScene = getCurrentScene();

            document.getElementById('totalRestaurants').textContent = restaurants.length;
            document.getElementById('todayCount').textContent = todayCount;
            document.getElementById('currentSceneDisplay').textContent = currentScene ? currentScene.name : '-';
        }

        function performSelection() {
            const currentSceneId = getCurrentSceneId();
            const restaurants = getRestaurants().filter(r => r.sceneId === currentSceneId);

            if (restaurants.length === 0) {
                const currentScene = getCurrentScene();
                alert(`当前场景（${currentScene ? currentScene.name : '-'}）暂无餐厅，请先添加！`);
                return;
            }

            const resultElement = document.getElementById('result');
            const resultText = resultElement.querySelector('.result-text');
            const selectBtn = document.getElementById('selectBtn');

            selectBtn.disabled = true;
            resultElement.classList.add('selecting');

            let count = 0;
            const maxCount = 20;
            const interval = setInterval(() => {
                const randomRestaurant = restaurants[Math.floor(Math.random() * restaurants.length)];
                resultText.textContent = randomRestaurant.name;
                count++;

                if (count >= maxCount) {
                    clearInterval(interval);

                    const selected = selectRestaurant(restaurants);
                    setTimeout(() => {
                        resultElement.classList.remove('selecting');
                        resultText.textContent = selected.name;

                        incrementTodayCount();
                        updateStats();

                        selectBtn.disabled = false;

                        resultElement.style.animation = 'none';
                        setTimeout(() => {
                            resultElement.style.animation = '';
                        }, 10);
                    }, 200);
                }
            }, 50);
        }

        // ========== 管理页面逻辑 ==========
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderRestaurants() {
            const currentSceneId = getCurrentSceneId();
            const restaurants = getRestaurants().filter(r => r.sceneId === currentSceneId);
            const container = document.getElementById('restaurantItems');

            if (restaurants.length === 0) {
                container.innerHTML = '<p class="empty-message">暂无餐厅，请添加...</p>';
                return;
            }

            const maxWeight = Math.max(...restaurants.map(r => r.weight));

            container.innerHTML = restaurants.map(restaurant => `
                <div class="restaurant-item" data-id="${restaurant.id}">
                    <div class="restaurant-info">
                        <div class="restaurant-name">${escapeHtml(restaurant.name)}</div>
                        <div class="restaurant-weight">权重: ${restaurant.weight}</div>
                        <div class="weight-bar">
                            <div class="weight-fill" style="width: ${(restaurant.weight / maxWeight) * 100}%"></div>
                        </div>
                    </div>
                    <div class="restaurant-actions">
                        <button class="action-btn edit-btn" onclick="editRestaurant(${restaurant.id})">编辑</button>
                        <button class="action-btn delete-btn" onclick="deleteRestaurant(${restaurant.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function addRestaurant() {
            const nameInput = document.getElementById('restaurantName');
            const weightInput = document.getElementById('restaurantWeight');

            const name = nameInput.value.trim();
            const weight = parseInt(weightInput.value);

            if (!name) {
                alert('请输入餐厅名称！');
                return;
            }

            if (weight < 1 || weight > 100) {
                alert('权重必须在 1-100 之间！');
                return;
            }

            const currentSceneId = getCurrentSceneId();
            const restaurants = getRestaurants();
            if (restaurants.some(r => r.sceneId === currentSceneId && r.name === name)) {
                alert('当前场景下该餐厅已存在！');
                return;
            }

            const newRestaurant = {
                id: generateId(),
                name: name,
                weight: weight,
                sceneId: currentSceneId
            };

            restaurants.push(newRestaurant);
            saveRestaurants(restaurants);

            nameInput.value = '';
            weightInput.value = '10';

            renderRestaurants();
            showToast('添加成功！');
        }

        function deleteRestaurant(id) {
            if (!confirm('确定要删除这个餐厅吗？')) {
                return;
            }

            const restaurants = getRestaurants();
            const filtered = restaurants.filter(r => r.id !== id);
            saveRestaurants(filtered);
            renderRestaurants();

            showToast('删除成功！');
        }

        function editRestaurant(id) {
            const restaurants = getRestaurants();
            const restaurant = restaurants.find(r => r.id === id);

            if (!restaurant) return;

            const newName = prompt('请输入新的餐厅名称:', restaurant.name);
            if (newName === null || newName.trim() === '') return;

            const newWeight = prompt('请输入新的权重 (1-100):', restaurant.weight);
            if (newWeight === null) return;

            const weight = parseInt(newWeight);
            if (isNaN(weight) || weight < 1 || weight > 100) {
                alert('权重必须在 1-100 之间！');
                return;
            }

            if (restaurants.some(r => r.id !== id && r.sceneId === restaurant.sceneId && r.name === newName.trim())) {
                alert('当前场景下该餐厅名称已存在！');
                return;
            }

            restaurant.name = newName.trim();
            restaurant.weight = weight;

            saveRestaurants(restaurants);
            renderRestaurants();

            showToast('更新成功！');
        }

        function renderSceneOptions() {
            const scenes = getScenes();
            const currentSceneId = getCurrentSceneId();
            const select = document.getElementById('currentSceneSelect');
            select.innerHTML = scenes.map(scene => `
                <option value="${scene.id}" ${scene.id === currentSceneId ? 'selected' : ''}>${escapeHtml(scene.name)}</option>
            `).join('');
        }

        function renderScenes() {
            const scenes = getScenes();
            const currentSceneId = getCurrentSceneId();
            const container = document.getElementById('sceneItems');
            container.innerHTML = scenes.map(scene => `
                <div class="scene-item ${scene.id === currentSceneId ? 'current' : ''}">
                    <div>
                        <span class="scene-name">${escapeHtml(scene.name)}</span>
                        ${scene.id === currentSceneId ? '<span class="scene-badge">当前</span>' : ''}
                    </div>
                    <div class="restaurant-actions">
                        <button class="action-btn edit-btn" onclick="renameScene(${scene.id})">重命名</button>
                        <button class="action-btn delete-btn" onclick="deleteScene(${scene.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function applyCurrentScene() {
            const select = document.getElementById('currentSceneSelect');
            const sceneId = parseInt(select.value, 10);
            const scenes = getScenes();
            if (!scenes.some(scene => scene.id === sceneId)) {
                alert('所选场景不存在！');
                return;
            }

            localStorage.setItem('currentSceneId', String(sceneId));
            renderSceneOptions();
            renderScenes();
            renderRestaurants();
            updateStats();
            showToast('场景已切换！');
        }

        function addScene() {
            const input = document.getElementById('sceneNameInput');
            const name = input.value.trim();
            if (!name) {
                alert('请输入场景名称！');
                return;
            }

            const scenes = getScenes();
            if (scenes.some(scene => scene.name === name)) {
                alert('该场景已存在！');
                return;
            }

            const scene = { id: generateSceneId(), name };
            scenes.push(scene);
            saveScenes(scenes);
            input.value = '';

            renderSceneOptions();
            renderScenes();
            showToast('场景添加成功！');
        }

        function renameScene(id) {
            const scenes = getScenes();
            const scene = scenes.find(s => s.id === id);
            if (!scene) return;

            const newName = prompt('请输入新的场景名称:', scene.name);
            if (newName === null) return;
            const trimmed = newName.trim();
            if (!trimmed) {
                alert('场景名称不能为空！');
                return;
            }

            if (scenes.some(s => s.id !== id && s.name === trimmed)) {
                alert('场景名称已存在！');
                return;
            }

            scene.name = trimmed;
            saveScenes(scenes);
            renderSceneOptions();
            renderScenes();
            updateStats();
            showToast('场景更新成功！');
        }

        function deleteScene(id) {
            const scenes = getScenes();
            if (scenes.length <= 1) {
                alert('至少需要保留一个场景！');
                return;
            }

            const currentSceneId = getCurrentSceneId();
            const targetScene = scenes.find(scene => scene.id === id);
            if (!targetScene) return;

            const relatedRestaurants = getRestaurants().filter(r => r.sceneId === id);
            const message = relatedRestaurants.length > 0
                ? `场景「${targetScene.name}」下有 ${relatedRestaurants.length} 个餐厅，删除后会一起删除。确定继续吗？`
                : `确定删除场景「${targetScene.name}」吗？`;

            if (!confirm(message)) {
                return;
            }

            const nextScenes = scenes.filter(scene => scene.id !== id);
            saveScenes(nextScenes);

            const restaurants = getRestaurants().filter(r => r.sceneId !== id);
            saveRestaurants(restaurants);

            if (currentSceneId === id) {
                localStorage.setItem('currentSceneId', String(nextScenes[0].id));
            }

            renderSceneOptions();
            renderScenes();
            renderRestaurants();
            updateStats();
            showToast('场景删除成功！');
        }

        let pendingImportData = null;

        function exportData() {
            const payload = {
                version: 1,
                exportedAt: new Date().toISOString(),
                scenes: getScenes(),
                restaurants: getRestaurants(),
                currentSceneId: getCurrentSceneId(),
                todayCount: getTodayCount(),
                lastDate: localStorage.getItem('lastDate')
            };

            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const dateTag = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `eat-today-backup-${dateTag}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('导出成功！');
        }

        function buildImportData(parsed) {
            const importedScenes = [];
            const sceneNameSet = new Set();
            if (Array.isArray(parsed.scenes)) {
                parsed.scenes.forEach((scene, index) => {
                    const name = typeof scene.name === 'string' ? scene.name.trim() : '';
                    if (!name || sceneNameSet.has(name)) return;
                    sceneNameSet.add(name);
                    importedScenes.push({
                        id: Number.isInteger(scene.id) && scene.id > 0 ? scene.id : index + 1,
                        name
                    });
                });
            }

            if (importedScenes.length === 0) {
                return null;
            }

            const validSceneIds = new Set(importedScenes.map(scene => scene.id));
            const importedRestaurants = [];
            const restaurantKeySet = new Set();
            if (Array.isArray(parsed.restaurants)) {
                parsed.restaurants.forEach((item) => {
                    const name = typeof item.name === 'string' ? item.name.trim() : '';
                    if (!name) return;
                    const rawWeight = parseInt(item.weight, 10);
                    const weight = Math.min(100, Math.max(1, Number.isNaN(rawWeight) ? 10 : rawWeight));
                    const sceneId = Number.isInteger(item.sceneId) && validSceneIds.has(item.sceneId)
                        ? item.sceneId
                        : importedScenes[0].id;
                    const uniqueKey = `${sceneId}::${name}`;
                    if (restaurantKeySet.has(uniqueKey)) return;
                    restaurantKeySet.add(uniqueKey);
                    importedRestaurants.push({ name, weight, sceneId });
                });
            }

            const fallbackCurrentSceneId = importedScenes[0].id;
            const currentSceneId = Number.isInteger(parsed.currentSceneId) && validSceneIds.has(parsed.currentSceneId)
                ? parsed.currentSceneId
                : fallbackCurrentSceneId;

            return {
                scenes: importedScenes,
                restaurants: importedRestaurants,
                currentSceneId,
                todayCount: parseInt(parsed.todayCount, 10),
                lastDate: typeof parsed.lastDate === 'string' ? parsed.lastDate : ''
            };
        }

        function syncRestaurantChecksByScenes() {
            const selectedSceneIds = new Set(
                Array.from(document.querySelectorAll('.import-scene-checkbox:checked'))
                    .map(item => parseInt(item.value, 10))
            );
            document.querySelectorAll('.import-restaurant-checkbox').forEach((checkbox) => {
                const sceneId = parseInt(checkbox.dataset.sceneId, 10);
                const row = checkbox.closest('.import-item');
                const enabled = selectedSceneIds.has(sceneId);
                checkbox.disabled = !enabled;
                if (!enabled) {
                    checkbox.checked = false;
                    row.classList.add('disabled');
                } else {
                    row.classList.remove('disabled');
                }
            });
        }

        function renderImportSelection() {
            if (!pendingImportData) return;
            const sceneList = document.getElementById('importSceneList');
            const restaurantList = document.getElementById('importRestaurantList');
            const summary = document.getElementById('importSummary');
            const sceneNameMap = new Map(pendingImportData.scenes.map(item => [item.id, item.name]));

            sceneList.innerHTML = pendingImportData.scenes.map(scene => `
                <label class="import-item">
                    <input class="import-scene-checkbox" type="checkbox" value="${scene.id}" checked>
                    <span>${escapeHtml(scene.name)}</span>
                </label>
            `).join('');

            restaurantList.innerHTML = pendingImportData.restaurants.length === 0
                ? '<p class="empty-message">文件中没有可导入的餐厅</p>'
                : pendingImportData.restaurants.map((item, index) => `
                    <label class="import-item">
                        <input class="import-restaurant-checkbox" type="checkbox" data-index="${index}" data-scene-id="${item.sceneId}" checked>
                        <span>${escapeHtml(item.name)}（${escapeHtml(sceneNameMap.get(item.sceneId) || '未知场景')}，权重 ${item.weight}）</span>
                    </label>
                `).join('');

            summary.textContent = `已加载：${pendingImportData.scenes.length} 个场景，${pendingImportData.restaurants.length} 个餐厅`;
            document.getElementById('importSelection').style.display = 'block';

            document.querySelectorAll('.import-scene-checkbox').forEach((checkbox) => {
                checkbox.addEventListener('change', syncRestaurantChecksByScenes);
            });
            syncRestaurantChecksByScenes();
        }

        function importDataFile(file) {
            const reader = new FileReader();
            reader.onload = () => {
                let parsed;
                try {
                    parsed = JSON.parse(reader.result);
                } catch (error) {
                    alert('导入失败：文件不是合法的 JSON');
                    return;
                }

                pendingImportData = buildImportData(parsed);
                if (!pendingImportData) {
                    alert('导入失败：文件中缺少可用场景数据');
                    return;
                }
                renderImportSelection();
                showToast('文件解析完成，请勾选要导入的场景和餐厅');
            };
            reader.readAsText(file, 'utf-8');
        }

        function applyImportSelection() {
            if (!pendingImportData) {
                alert('请先选择导入文件！');
                return;
            }

            const selectedSourceSceneIds = new Set(
                Array.from(document.querySelectorAll('.import-scene-checkbox:checked'))
                    .map(item => parseInt(item.value, 10))
            );
            if (selectedSourceSceneIds.size === 0) {
                alert('请至少选择一个场景！');
                return;
            }

            const selectedRestaurantIndexes = Array.from(document.querySelectorAll('.import-restaurant-checkbox:checked'))
                .map(item => parseInt(item.dataset.index, 10))
                .filter(index => !Number.isNaN(index));

            const workingScenes = getScenes();
            let nextSceneId = workingScenes.length > 0 ? Math.max(...workingScenes.map(item => item.id)) + 1 : 1;
            const sourceToTargetSceneIdMap = new Map();

            pendingImportData.scenes.forEach((scene) => {
                if (!selectedSourceSceneIds.has(scene.id)) return;
                const existed = workingScenes.find(item => item.name === scene.name);
                if (existed) {
                    sourceToTargetSceneIdMap.set(scene.id, existed.id);
                    return;
                }
                const createdScene = { id: nextSceneId++, name: scene.name };
                workingScenes.push(createdScene);
                sourceToTargetSceneIdMap.set(scene.id, createdScene.id);
            });
            saveScenes(workingScenes);

            const workingRestaurants = getRestaurants();
            let nextRestaurantId = workingRestaurants.length > 0 ? Math.max(...workingRestaurants.map(item => item.id)) + 1 : 1;
            let importedCount = 0;
            let updatedCount = 0;

            selectedRestaurantIndexes.forEach((index) => {
                const sourceRestaurant = pendingImportData.restaurants[index];
                if (!sourceRestaurant) return;
                if (!selectedSourceSceneIds.has(sourceRestaurant.sceneId)) return;

                const targetSceneId = sourceToTargetSceneIdMap.get(sourceRestaurant.sceneId);
                if (!targetSceneId) return;

                const existed = workingRestaurants.find(item =>
                    item.sceneId === targetSceneId && item.name === sourceRestaurant.name
                );
                if (existed) {
                    existed.weight = sourceRestaurant.weight;
                    updatedCount++;
                    return;
                }

                workingRestaurants.push({
                    id: nextRestaurantId++,
                    name: sourceRestaurant.name,
                    weight: sourceRestaurant.weight,
                    sceneId: targetSceneId
                });
                importedCount++;
            });
            saveRestaurants(workingRestaurants);

            const mappedCurrentSceneId = sourceToTargetSceneIdMap.get(pendingImportData.currentSceneId);
            if (mappedCurrentSceneId) {
                localStorage.setItem('currentSceneId', String(mappedCurrentSceneId));
            }

            if (document.getElementById('importTodayCountOpt').checked) {
                const nextTodayCount = Number.isNaN(pendingImportData.todayCount) ? 0 : Math.max(0, pendingImportData.todayCount);
                localStorage.setItem('todayCount', String(nextTodayCount));
                if (pendingImportData.lastDate && pendingImportData.lastDate.trim()) {
                    localStorage.setItem('lastDate', pendingImportData.lastDate);
                } else {
                    localStorage.setItem('lastDate', new Date().toDateString());
                }
            }

            normalizeScenes();
            normalizeRestaurantsForScenes();
            renderSceneOptions();
            renderScenes();
            renderRestaurants();
            updateStats();
            showToast(`导入完成：新增 ${importedCount}，更新 ${updatedCount}`);
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.className = 'toast';

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            initDefaultScenes();
            initDefaultRestaurants();
            normalizeScenes();
            normalizeRestaurantsForScenes();
            updateStats();

            // 主页事件
            document.getElementById('selectBtn').addEventListener('click', performSelection);
            document.getElementById('manageBtn').addEventListener('click', () => {
                showPage('managePage');
                renderSceneOptions();
                renderScenes();
                renderRestaurants();
            });

            // 管理页面事件
            document.getElementById('addBtn').addEventListener('click', addRestaurant);
            document.getElementById('applySceneBtn').addEventListener('click', applyCurrentScene);
            document.getElementById('addSceneBtn').addEventListener('click', addScene);
            document.getElementById('exportDataBtn').addEventListener('click', exportData);
            document.getElementById('importDataBtn').addEventListener('click', () => {
                document.getElementById('importFileInput').click();
            });
            document.getElementById('importFileInput').addEventListener('change', (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                importDataFile(file);
                e.target.value = '';
            });
            document.getElementById('confirmImportBtn').addEventListener('click', applyImportSelection);
            document.getElementById('selectAllScenesBtn').addEventListener('click', () => {
                document.querySelectorAll('.import-scene-checkbox').forEach((checkbox) => {
                    checkbox.checked = true;
                });
                syncRestaurantChecksByScenes();
            });
            document.getElementById('clearAllScenesBtn').addEventListener('click', () => {
                document.querySelectorAll('.import-scene-checkbox').forEach((checkbox) => {
                    checkbox.checked = false;
                });
                syncRestaurantChecksByScenes();
            });
            document.getElementById('selectAllRestaurantsBtn').addEventListener('click', () => {
                document.querySelectorAll('.import-restaurant-checkbox').forEach((checkbox) => {
                    if (!checkbox.disabled) {
                        checkbox.checked = true;
                    }
                });
            });
            document.getElementById('clearAllRestaurantsBtn').addEventListener('click', () => {
                document.querySelectorAll('.import-restaurant-checkbox').forEach((checkbox) => {
                    checkbox.checked = false;
                });
            });
            document.getElementById('backBtn').addEventListener('click', () => {
                showPage('homePage');
                updateStats();
            });

            // 回车添加餐厅
            document.getElementById('restaurantName').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addRestaurant();
                }
            });

            document.getElementById('restaurantWeight').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addRestaurant();
                }
            });

            document.getElementById('sceneNameInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addScene();
                }
            });
        });
    </script>
</body>
</html>
